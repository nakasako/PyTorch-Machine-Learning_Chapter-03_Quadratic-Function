# 過学習体験用設定ファイル

seed: 1234
device: cpu

data:
  num_samples: 64 # データセットのサンプル数を減らす（過学習を促進）
  x_min: -3.0
  x_max: 3.0
  noise_std: 0.35
  quadratic:
    a: 0.7
    b: -0.4
    c: 1.2

model:
  input_dim: 1
  hidden_dims: [128, 128, 128] # 隠れ層の次元を増やす（過剰なモデルサイズで過学習を促進）
  output_dim: 1
  activation: relu # 活性化関数をReLUに変更 (0以下では勾配が0になるため、過学習を促進)
  weight_init: xavier_uniform
  hidden_bias_range: 0 # 隠れ層のバイアスを0で初期化（ReLU活性化関数と組み合わせて過学習を促進）

training:
  epochs: 1000  # エポック数を増やす（過学習を促進）
  learning_rate: 0.002  # 学習率を下げる（過学習を促進）
  weight_decay: 0.0 # L2正則化をなしにする（過学習を促進）
  log_every: 25
  snapshot_every: 10

paths:
  checkpoint_dir: checkpoints
  checkpoint_name: quadratic_regressor_overfitting.pt
  output_dir: outputs
  animation_name: quadratic_training_overfitting.gif

animation:
  fps: 12
  dpi: 120
